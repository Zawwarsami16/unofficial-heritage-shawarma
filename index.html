  <!-- Cinematic loader -->
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#03020C;min-height:100vh}
    #loader{
      position:fixed;inset:0;z-index:99999;
      background:#03020C;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;
      transition:opacity .55s cubic-bezier(.76,0,.24,1), transform .55s cubic-bezier(.76,0,.24,1);
    }
    #loader.done{opacity:0;transform:translateY(-8px);pointer-events:none}
    .l-logo{
      font-family:Georgia,serif;font-size:clamp(32px,6vw,56px);
      font-weight:900;font-style:italic;color:#F4ECD8;
      letter-spacing:-2px;line-height:1;margin-bottom:6px;
      opacity:0;transform:translateY(14px);
      animation:lup .6s .1s cubic-bezier(.16,1,.3,1) forwards;
    }
    .l-sub{
      font-family:system-ui,sans-serif;font-size:9px;font-weight:600;
      letter-spacing:5px;text-transform:uppercase;color:rgba(244,236,216,0.28);
      opacity:0;animation:lup .5s .3s ease forwards;
    }
    .l-bar{width:120px;height:1px;background:rgba(244,236,216,0.08);margin-top:28px;overflow:hidden;opacity:0;animation:lup .4s .45s ease forwards;}
    .l-fill{height:100%;background:linear-gradient(to right,#FF5C1A,#E8C040);animation:lfill 1.1s .5s cubic-bezier(.16,1,.3,1) forwards;transform:scaleX(0);transform-origin:left;}
    @keyframes lup{to{opacity:1;transform:none}}
    @keyframes lfill{to{transform:scaleX(1)}}
  </style>
  <script>
    window.__loaderDone=function(){var l=document.getElementById('loader');if(!l)return;l.classList.add('done');setTimeout(function(){l.remove()},600);}
    setTimeout(window.__loaderDone,3000);
  </script>
